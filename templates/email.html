{% extends "base.html" %}
{% block title %}Email - What's Going On{% endblock %}

{% block content %}
<div class="page-header">
    <h2 class="page-title">📧 邮件组查阅</h2>
    <p class="page-desc">选择邮件组，加载邮件并生成摘要</p>
</div>

<div class="controls">
    <select id="list-select">
        <option value="">-- 选择邮件组 --</option>
    </select>
    <div class="ds-range-selector" id="email-range-selector">
        <button class="ds-range-btn" data-days="1">最近 1 天</button>
        <button class="ds-range-btn active" data-days="3">最近 3 天</button>
        <button class="ds-range-btn" data-days="7">最近 7 天</button>
    </div>
    <div class="ds-range-selector" id="email-lang-selector">
        <button class="ds-range-btn active" data-lang="zh">中文</button>
        <button class="ds-range-btn" data-lang="en">English</button>
    </div>
    <button class="btn btn-daily-summary" id="btn-email-run">加载邮件并生成摘要</button>
</div>

<div id="email-status" class="status hidden"></div>
<div id="email-progress-log" class="progress-log hidden"></div>

<div id="digest-section" class="card hidden">
    <h2>📊 邮件摘要</h2>
    <div id="digest-content" class="digest-content"></div>
</div>

<div id="emails-section" class="card hidden">
    <h2>📧 邮件列表 (<span id="email-count">0</span>)</h2>
    <div id="email-list"></div>
</div>

<div id="history-section" class="card">
    <h2 class="history-toggle" id="history-toggle">📜 历史摘要 <span class="toggle-icon">▶</span></h2>
    <div id="history-list" class="history-list hidden"></div>
    <div id="history-content" class="history-content hidden">
        <button class="btn btn-sm btn-secondary" id="history-back">← 返回列表</button>
        <div id="history-detail" class="digest-content"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/app.js"></script>
{% endblock %}
