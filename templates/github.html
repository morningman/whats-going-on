{% extends "base.html" %}
{% block title %}GitHub - What's Going On{% endblock %}

{% block content %}
<div class="page-header">
    <h2 class="page-title">🐙 GitHub 活动</h2>
    <p class="page-desc">跟踪公开仓库的 PR 和 Issue 活动</p>
</div>

<div class="controls">
    <select id="repo-select">
        <option value="">-- 选择仓库 --</option>
    </select>
    <div class="ds-range-selector" id="gh-range-selector">
        <button class="ds-range-btn" data-days="1">最近 1 天</button>
        <button class="ds-range-btn active" data-days="3">最近 3 天</button>
        <button class="ds-range-btn" data-days="7">最近 7 天</button>
    </div>
    <div class="ds-range-selector" id="gh-lang-selector">
        <button class="ds-range-btn active" data-lang="zh">中文</button>
        <button class="ds-range-btn" data-lang="en">English</button>
    </div>
    <button class="btn btn-daily-summary" id="btn-gh-run">加载并生成摘要</button>
</div>

<div id="gh-status" class="status hidden"></div>
<div id="gh-progress-log" class="progress-log hidden"></div>

<div id="gh-digest-section" class="card hidden">
    <h2>📊 仓库活动摘要</h2>
    <div id="gh-digest-content" class="digest-content"></div>
</div>

<div id="gh-activity-section" class="hidden">
    <!-- PR/Issue tabs -->
    <div class="gh-tabs">
        <div class="ds-tab-nav" role="tablist">
            <button class="ds-tab-btn active" data-tab="gh-tab-prs" role="tab">🔀 Pull Requests <span
                    class="ds-tab-count" id="gh-pr-count">0</span></button>
            <button class="ds-tab-btn" data-tab="gh-tab-issues" role="tab">🐛 Issues <span class="ds-tab-count"
                    id="gh-issue-count">0</span></button>
        </div>

        <div class="ds-tab-panel" id="gh-tab-prs" role="tabpanel">
            <div id="gh-pr-list"></div>
        </div>
        <div class="ds-tab-panel hidden" id="gh-tab-issues" role="tabpanel">
            <div id="gh-issue-list"></div>
        </div>
    </div>
</div>

<div id="history-section" class="card">
    <h2 class="history-toggle" id="history-toggle">📜 历史摘要 <span class="toggle-icon">▶</span></h2>
    <div id="history-list" class="history-list hidden"></div>
    <div id="history-content" class="history-content hidden">
        <button class="btn btn-sm btn-secondary" id="history-back">← 返回列表</button>
        <div id="history-detail" class="digest-content"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/github.js"></script>
{% endblock %}
