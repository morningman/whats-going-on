{% extends "base.html" %}
{% block title %}GitHub - What's Going On{% endblock %}

{% block content %}
<div class="page-header">
    <h2 class="page-title">🐙 GitHub 活动</h2>
    <p class="page-desc">跟踪公开仓库的 PR 和 Issue 活动</p>
</div>

<div class="controls">
    <select id="repo-select">
        <option value="">-- 选择仓库 --</option>
    </select>
    <div class="ds-range-selector" id="gh-range-selector">
        <button class="ds-range-btn active" data-days="3">最近 3 天</button>
        <button class="ds-range-btn" data-days="7">最近 7 天</button>
        <button class="ds-range-btn" data-range="last-week">上一周</button>
    </div>
    <div class="ds-range-selector" id="gh-lang-selector">
        <button class="ds-range-btn active" data-lang="zh">中文</button>
        <button class="ds-range-btn" data-lang="en">English</button>
    </div>
    <button class="btn btn-daily-summary" id="btn-gh-run">加载并生成摘要</button>
    <button class="btn btn-daily-summary" id="btn-gh-run-all"
        style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">🚀 生成全部摘要</button>
</div>

<div id="gh-status" class="status hidden"></div>
<div id="gh-progress-log" class="progress-log hidden"></div>

<div id="gh-digest-section" class="card hidden">
    <div class="digest-header">
        <h2 id="gh-digest-title">📊 仓库活动摘要</h2>
        <button class="btn btn-sm btn-feishu hidden" id="btn-feishu-push-gh" title="推送到飞书">🐦 推送到飞书</button>
        <button class="btn btn-sm btn-feishu hidden" id="btn-feishu-create-doc-gh" title="创建飞书文档并推送链接">📄
            创建飞书文档</button>
        <button class="btn btn-sm btn-slack hidden" id="btn-slack-push-gh" title="推送到 Slack">💬 推送到 Slack</button>
        <button class="btn btn-sm btn-linkedin hidden" id="btn-linkedin-gh" title="Generate LinkedIn Post">🔗 Generate LinkedIn Post</button>
    </div>
    <div id="gh-digest-content" class="digest-content"></div>
</div>

<!-- Batch digest section -->
<div id="gh-batch-section" class="card hidden">
    <div class="digest-header">
        <h2 id="gh-batch-title">📊 全部仓库摘要</h2>
        <button class="btn btn-sm btn-feishu" id="btn-feishu-push-all" title="批量推送到飞书">📄 批量推送飞书文档</button>
        <button class="btn btn-sm btn-feishu hidden" id="btn-feishu-push-to-group" title="推送链接到飞书群">🐦 推送到飞书群</button>
    </div>
    <div id="gh-batch-content" class="digest-content"></div>
</div>

<div id="gh-activity-section" class="hidden">
    <!-- PR/Issue tabs -->
    <div class="gh-tabs">
        <div class="ds-tab-nav" role="tablist">
            <button class="ds-tab-btn active" data-tab="gh-tab-prs" role="tab">🔀 Pull Requests <span
                    class="ds-tab-count" id="gh-pr-count">0</span></button>
            <button class="ds-tab-btn" data-tab="gh-tab-issues" role="tab">🐛 Issues <span class="ds-tab-count"
                    id="gh-issue-count">0</span></button>
        </div>

        <div class="ds-tab-panel" id="gh-tab-prs" role="tabpanel">
            <div id="gh-pr-list"></div>
        </div>
        <div class="ds-tab-panel hidden" id="gh-tab-issues" role="tabpanel">
            <div id="gh-issue-list"></div>
        </div>
    </div>
</div>

<div id="history-section" class="card">
    <h2 class="history-toggle" id="history-toggle">📜 历史摘要 <span class="toggle-icon">▶</span></h2>
    <div id="history-list" class="history-list hidden"></div>
    <div id="history-content" class="history-content hidden">
        <div class="history-actions">
            <button class="btn btn-sm btn-secondary" id="history-back">← 返回列表</button>
            <button class="btn btn-sm btn-feishu hidden" id="btn-feishu-push-history" title="推送到飞书">🐦 推送到飞书</button>
            <button class="btn btn-sm btn-slack hidden" id="btn-slack-push-history" title="推送到 Slack">💬 推送到
                Slack</button>
        </div>
        <div id="history-detail" class="digest-content"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<!-- Slack Preview Modal -->
<div id="slack-preview-modal" class="slack-modal-overlay hidden">
    <div class="slack-modal">
        <div class="slack-modal-header">
            <h3>💬 Slack 消息预览</h3>
            <button class="slack-modal-close" id="slack-modal-close">&times;</button>
        </div>
        <div class="slack-modal-body">
            <!-- Markdown source editor -->
            <div class="slack-preview-section">
                <label class="slack-preview-label">📝 编辑内容 <span class="slack-preview-hint">（Markdown 格式，修改后下方预览会实时更新）</span></label>
                <textarea id="slack-preview-textarea" class="slack-preview-textarea" rows="10"></textarea>
            </div>

            <!-- Rendered preview (read-only) -->
            <div class="slack-preview-section">
                <label class="slack-preview-label">👀 预览效果</label>
                <div class="slack-message-preview" id="slack-message-render">
                    <!-- Rendered preview will be injected here -->
                </div>
            </div>
        </div>
        <div class="slack-modal-footer">
            <button class="btn btn-secondary" id="slack-modal-cancel">取消</button>
            <button class="btn btn-secondary" id="slack-modal-reset" title="恢复到原始内容">↩️ 重置</button>
            <button class="btn btn-slack slack-modal-send" id="slack-modal-send">🚀 发送到 Slack</button>
        </div>
    </div>
</div>

<!-- LinkedIn Preview Modal -->
<div id="linkedin-preview-modal" class="slack-modal-overlay hidden">
    <div class="slack-modal">
        <div class="slack-modal-header">
            <h3>🔗 LinkedIn Post Preview</h3>
            <button class="slack-modal-close" id="linkedin-modal-close">&times;</button>
        </div>
        <div class="slack-modal-body">
            <div class="slack-preview-section">
                <label class="slack-preview-label">📝 Edit Post <span class="slack-preview-hint">(you can edit before copying)</span></label>
                <textarea id="linkedin-preview-textarea" class="slack-preview-textarea" rows="14"></textarea>
            </div>
        </div>
        <div class="slack-modal-footer">
            <button class="btn btn-secondary" id="linkedin-modal-cancel">Cancel</button>
            <button class="btn btn-slack" id="linkedin-modal-copy">📋 Copy to Clipboard</button>
        </div>
    </div>
</div>

<script src="/static/github.js"></script>
{% endblock %}
